body:
  text: 西天譯經三藏朝散大夫試鴻臚少卿傳法大師臣施護奉詔譯爾時持世菩薩白佛言世尊若復有人受持讀誦此陀羅尼者云何受持願佛演説爾時世尊告持世言若復有人於初二月白月一日於彼獨注入海之河乃入水中水至乳已面東向日合掌而立始從日出限至日沒誦持此呪從水出已絶食七日日夜誦持勿共人語然後乃畫持世本形將欲塗彩用珍重心以白栴檀香水塗絹乃經一宿表心供養命畫匠師令受齋戒澡浴新衣起珍重心依法莊彩像高十肘橫廣三肘色彩深緑座於蓮華莊嚴無量色彩鮮潔光明如日右手執果左手安慰容貌熙怡座前龍王手捧寶匣真珠寶瓶珊瑚碼瑙金銀琉璃種種衆寶淨心供養上安諸天寶雲雨網大吉祥天手捧蓮華右邊安慰吉祥寶掌左邊侍立形色圓滿瓔珞嚴身手捧蓮華作安慰相持世之像舍利處安閼伽香水種種細食花鬘酥油然燈供養復用妙花酥油香燈飲食種種供養頻那及於夜伽希無魔事伸供養已復用檀栴沈水及諸妙香酥香油燈無量供養面對觀想菩薩像前志心專注端坐持誦始從寅時入於壇內或一七日或二七日乃至一日至日出時期願必應悉皆成就爾時世尊告持世言若復有人復於夜半入在水內誦持此呪滿八百遍於當月內獲滿所願佛告持世若復有人復於夜半依法誦持持世菩薩依法潔淨於六月內必獲所願佛告持世若復有人藏於財物後時廢忘依法誦持財物必得佛告持世若復有人欲求榮位晝入水內誦持此呪至於夜半復用胡麻而作護摩一粒一念一遍一燒至八百遍必獲大喜富貴滿足佛告持世若復有人用白芥子與酥相和一念一粒一遍一燒準前作法亦作護摩王獲喜慶國土無災佛告持世若復有人用妙乳香與酥相和而作護摩準前作法能息大臣所有災難佛告持世若復有人於夜半內志心誦持菩薩名號依法護淨一七日內獲大財喜成就具足佛告持世若復有人白月一日起首作法受持齋戒於舍利處安菩薩像依法供養憶念誦持菩薩名號志心期願必現化形於前慰安獲不退轉起菩薩行佛告持世若復有人素食梵行斷食酒肉日夜恆誦獲大富貴爾時世尊説此儀軌名根本呪即於衆會而説呪曰曩謨引囉引怛曩二合怛囉二合夜野唵引一嚩蘇馱哩引薩嚩二合引賀引二唵引洛乞叉弭三合引步多攞三儞嚩引悉寧曳薩嚩二合賀引四爾時世尊説此呪已告持世言所有印法以表心法亦名外表作此印時用於兩手合掌虛中復用頭指拳在中間無名指竪小指如計而互相交中指形狀直量如針此印形相住彼八方各各相離此持世軌儀之印依法結印誦持明呪一切所願皆得成就廣利有情爾時世尊而説呪曰唵引室哩二合曳室哩二合引迦哩馱曩迦哩馱引禰也二合迦哩薩嚩二合引賀引爾時世尊説此呪已告持世言此三昧印應先合掌用大母指屈入掌內此名持世三昧之印爾時世尊而説呪曰唵引三麼曳掃彌曳二合三麼野迦哩麼賀引三麼曳薩嚩二合引賀引爾時世尊告持世言此三昧印神呪如是復次持世應用頭指及於中指第三節屈大母指竪此印名為持世菩薩根本之印召請聖賢及送聖賢皆作此印佛告持世應用頭指向外橫舒此名花印爾時世尊而説呪曰唵引嚩蘇地薩嚩二合引賀引佛告持世此花印呪如是受持爾時世尊復告持世若復有人應用中指而各橫舒此名香印爾時世尊而説呪曰唵引嚩蘇馱哩薩嚩二合引賀引爾時世尊説此呪已告持世言若復有人用無名指向外而舒名塗香印爾時世尊而説呪曰唵引嚩蘇麼底室哩二合引曳薩嚩二合引賀引爾時世尊説此呪已告持世言若復有人應用小指與大母指相捻而作餘三指舒如三股金剛此名燈印爾時世尊而説呪曰唵引嚩蘇馱引囉抳薩嚩二合引賀引爾時世尊説此呪已告持世言若復有人應用二手如掬水勢用大母指交結過在頭指已外此名食印爾時世尊而説呪曰唵引馱囉抳馱引囉抳薩嚩二合引賀引爾時世尊説此呪已告持世言諸餘供養同根本印呪加護之若常用法以常呪印而加持之若復有人彩畫持世菩薩之像應用新絹細妙無瑕依佛肘量長可二尺橫一尺像上安佛右邊觀音聖自在像左邊建立金剛手像從佛中間安持世像像形金色菩薩右手作施願相莊嚴種種真珠琉璃乃至碼瑙皆用嚴飾於下右邊安誦持人右手頂禮左手持冠於白月內圖畫菩薩於此誦持一十萬遍隨力供養爾時世尊告持世言若復有人將欲種田誦持之人澡浴新衣受持齋戒以菩薩像安在田中復用塗香花鬘瓔珞細妙飲食珍重供養念菩薩名至八百遍又於像前加持香水誦八百遍滿注賢瓶安在像前令種田人及牛耒𮋦行列而立以賢瓶水乃用灑之并誦持人灑之亦爾令誦持人繞此田地及彼人牛行於七匝然可下子爾時世尊告持世言若復有人將欲收田於地四隅安僧令齋飲食如法此誦持人沐浴淨衣受持齋戒復用尊像安置田中復用華香燈燭飲食種種供養誦呪加持滿八百遍復於像前香水滿瓶誦八百遍復加持之菩薩尊像面東安置塗香酥油花鬘飲食淨心供養穀實倍增離諸災難爾時世尊告持世言若復有人於此穀聚四隅之間安四童女著新淨衣素食令齋誦持此呪而加持之穀亦增多災難不侵復次持世若量穀時彼人想念菩薩尊號若誦持人不得出聲默念專志量畢已來亦乃倍增佛告持世若復有人田初熟時應先供養佛及聖衆增福無量不可稱讚爾時世尊告持世言若復有人於收藏時先於倉內畫二矮人裸形大肚手執栲栳作瀉穀勢穀形金色於此倉內陳設種種然後倉內燒衆妙香及以衆花閼伽香水傘蓋幢幡并諸供養復將菩薩安於倉內復用牛乳灑在倉內誦持真言除去諸物方入財穀吉祥無患復次持世於此庫藏陳設新食香花供養受持讀誦此陀羅尼離諸災難復次持世若復有人而用綵帛書寫持世陀羅尼經復用香熏讀誦頂戴增福無量息除災難佛告持世若人誦持應先淨心誦八百遍此陀羅尼日三時誦所願必應菩薩加祐復次持世若復有人求諸所願於自所止向東北隅起聖持世菩薩形像用妙綵帛依法圖寫乃至工畢潔淨安置志心供養閼伽香水塗香燒香栴檀沈水種種衆香復用五寶及用五藥乃至五穀閼伽之瓶以帛覆上勿開此瓶依法誦持此陀羅尼一切所願悉皆滿足財物增長獲福無量爾時世尊復告持世若有衆生欲作倉庫隨量大小若欲取時應用酥食供養尊像依法誦持此陀羅尼百二十遍滿此數足然後方出息除衆難爾時世尊告持世言若復有人持財遠出骨肉憂惱用白莎草木濯取汁牛黃鬱金龍腦檀麝和閼伽水畫於舶船淨心誦持此陀羅尼財物速至遠路平善增長滿足爾時世尊而説呪曰怛儞野二合他引唧隸唧隸阿誐蹉阿誐蹉婆誐嚩諦爾時世尊説此呪已復告持世此陀羅尼若有受持能滿一切有情所願譬如水大遍滿於地又如日光能破諸暗猶如月光與物清涼爾時世尊而説呪曰怛儞野二合他引馱曩努一嚩嚕拏二室寧二合引嚩三印捺囉二合四室寧二合引嚩五蘇諦引惹娑引六摩努引七努誐䜝八唧哆野覩九設哆簷十薩那引鉢囉二合野探十一野他迦引楞十二悉殿覩十三滿怛囉二合跛那十四引儞賀十五引怛儞野二合他引一佉吒佉吒二契致契致三具啅具啅四蘇嚕蘇嚕五母嚕母嚕六捫左捫左七曩摩哩八曩摩哩九泥去呬泥去呬十捺引波野十一捺引波野十二鉢怛囉三合十三底瑟姹二合諦十四呬囉抳野二合十五蘇嚩囉拏二合十六鉢囉二合捺引波野十七娑嚩二合引賀引十八嚩蘇地引十九娑嚩二合引賀引二十阿耨答半二合曩引野二十一娑嚩二合引賀引二十二嚩護地引二十三娑嚩二合引賀引二十四嚩蘇馱引二十五地波哆曳引二十六娑嚩二合引賀引二十七愚矯二合二十八娑嚩二合引賀引二十九蘇囉鼻引三十娑嚩二合引賀引三十一印捺囉二合引野三十二娑嚩二合引賀引三十三嚩嚕拏引野三十四娑嚩二合引賀引三十五吠無蓋反室囉二合摩拏引野三十六娑嚩二合引賀引三十七𡫸世毗喻二合引三十八尾𡫸世毗藥二合三十九娑嚩二合引賀引四十塢答波二合引捺演覩弭劍引乞叉二合曩訶阿尾囉訶曩拏謨捺演覩引唵引怛蘇二合呬迷引𡫸引呬捺捺引波野引娑嚩二合引賀引爾時世尊説此呪已告持世言此呪名為持世菩薩心陀羅尼若復有人淨心受持此陀羅尼憶念不忘能滅重罪獲福無量捨離三惡圓滿富貴於諸所願無不具足乃至究竟成無上果爾時持世菩薩及諸聖衆聞佛所説歡喜無量頭面禮足信受奉行
